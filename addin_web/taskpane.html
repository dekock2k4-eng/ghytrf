<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheetMind</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark" data-view="chat">
  <div class="grain" aria-hidden="true"></div>
  <div class="aura" aria-hidden="true"></div>

  <!-- ░░ Top bar ░░ -->
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="assets/icon-128.png" alt="SheetMind" />
      <div class="brand-text">
        <div class="brand-name">SheetMind</div>
        <div class="brand-sub">copilot for Excel</div>
      </div>
    </div>

    <div class="seg" id="viewSeg" role="tablist">
      <button data-v="chat" class="on" role="tab">Chat</button>
      <button data-v="sheet" role="tab">Sheet</button>
      <span class="seg-glow" aria-hidden="true"></span>
    </div>

    <div class="top-actions">
      <button class="chip model-chip" id="modelChip" title="Active model">
        <span class="dot" id="statusDot"></span><span id="modelName">connecting…</span>
      </button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <!-- ░░ Workspace: sheet view + chat ░░ -->
  <div class="workspace">

    <!-- Live spreadsheet view -->
    <section class="pane sheet-pane" id="sheetPane">
      <div class="pane-head">
        <div class="pane-title">
          <svg class="grid-ic" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
          <span id="sheetName">sample data</span>
          <span class="pane-meta" id="sheetMeta"></span>
        </div>
        <div class="pane-tools" id="paneTools"></div>
      </div>
      <div class="sheet-scroll" id="sheetScroll"></div>
    </section>

    <!-- Conversation -->
    <section class="pane chat-pane">
      <main class="timeline" id="timeline">
        <section class="hero" id="hero">
          <div class="hero-glyph"><img src="assets/icon-300.png" alt="" /></div>
          <h1 class="hero-title">What should we do<br/>with this sheet?</h1>
          <p class="hero-sub" id="syncStatus"><span class="sync-pulse"></span> reading…</p>
          <div class="suggestions" id="suggestions"></div>
        </section>
      </main>

      <footer class="composer">
        <div class="composer-shell">
          <textarea id="cmd" rows="1" placeholder="Ask anything, or give a command…"
                    autocomplete="off" spellcheck="false"></textarea>
          <div class="composer-actions">
            <button class="icon-btn mic" id="micBtn" title="Voice command" aria-label="Voice">
              <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
            </button>
            <button class="send" id="sendBtn" title="Send (Enter)" aria-label="Send">
              <svg viewBox="0 0 24 24"><path d="M4 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
        <div class="composer-hint">
          <kbd>Enter</kbd> send · <kbd>⇧</kbd><kbd>Enter</kbd> newline ·
          <button class="link" id="resyncBtn">re-sync sheet</button>
        </div>
      </footer>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
